<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Funcionários</title>
    <link rel="stylesheet" href="/assets/css/casdastro-funcionario.css">
</head>
<body>

<div class="container">
    <h1>Cadastro de Funcionários</h1>

    <div class="form">
        <input type="hidden" id="codigo">

        <label>Nome</label>
        <input type="text" id="nome">

        <label>Cargo</label>
        <input type="text" id="cargo">

        <label>Salário</label>
        <input type="number" id="salario">

        <label>Quantidade de Filhos</label>
        <input type="number" id="filhos">

        <button onclick="salvar()">Salvar</button>
        <button onclick="limpar()">Limpar</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Código</th>
                <th>Nome</th>
                <th>Cargo</th>
                <th>Salário</th>
                <th>Filhos</th>
                <th>Auxílio</th>
                <th>Salário Final</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaFuncionarios"></tbody>
    </table>
</div>

<script src="/assets/js/cadastro-funcionario.js"></script>
</body>
</html>
