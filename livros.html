<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Livros</title>
    <link rel="stylesheet" href="/assets/css/livros.css">
</head>
<body>

<div class="container">
    <h1>Cadastro de Livros</h1>

    <div class="form">
        <input type="hidden" id="codigo">

        <label>Título</label>
        <input type="text" id="titulo">

        <label>Autor</label>
        <input type="text" id="autor">

        <label>Quantidade de Páginas</label>
        <input type="number" id="paginas">

        <label>Ano de Publicação</label>
        <input type="number" id="ano">

        <!-- Radio -->
        <label>Tipo de Livro</label>
        <div class="radio-group">
            <label><input type="radio" name="tipo" value="Físico"> Físico</label>
            <label><input type="radio" name="tipo" value="Digital"> Digital</label>
        </div>

        <button onclick="salvar()">Salvar</button>
        <button onclick="limpar()">Limpar</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Código</th>
                <th>Título</th>
                <th>Autor</th>
                <th>Páginas</th>
                <th>Ano</th>
                <th>Classificação</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaLivros"></tbody>
    </table>
</div>

<script src="/assets/js/livros.js"></script>
</body>
</html>
