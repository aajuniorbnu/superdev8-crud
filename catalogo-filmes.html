<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Filmes</title>

<link rel="stylesheet" href="/assets/css/catalogo.css">
</head>

<body>

<div class="container">

<h1>Cadastro de Filmes</h1>

<input type="hidden" id="codigo">

<div class="form">

<label>Nome do Filme</label>
<input type="text" id="nome">

<label>Gênero</label>
<input type="text" id="genero">

<label>Duração (minutos)</label>
<input type="number" id="duracao">

<label>Nota</label>
<input type="number" id="nota">

<label>
<input type="checkbox" id="cinema">
Assistido no cinema
</label>

<button onclick="salvar()">Salvar</button>

</div>

<table>

<thead>

<tr>
<th>Código</th>
<th>Filme</th>
<th>Gênero</th>
<th>Duração</th>
<th>Nota</th>
<th>Classificação</th>
<th>Cinema</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="tabelaFilmes"></tbody>

</table>

</div>

<script src="/assets/js/catalogo-filmes.js"></script>

</body>
</html>
