<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Alunos</title>
    <link rel="stylesheet" href="/assets/css/aluno-nota.css">
</head>
<body>

<div class="container">
    <h1>Cadastro de Alunos</h1>

    <div class="form">
        <input type="hidden" id="codigo">

        <label>Nome do Aluno</label>
        <input type="text" id="nome">

        <label>Nota 1</label>
        <input type="number" id="nota1">

        <label>Nota 2</label>
        <input type="number" id="nota2">

        <label>Nota 3</label>
        <input type="number" id="nota3">

        <label>Turno</label>
        <div class="radio-group">
            <label><input type="radio" name="turno" value="Manhã"> Manhã</label>
            <label><input type="radio" name="turno" value="Tarde"> Tarde</label>
            <label><input type="radio" name="turno" value="Noite"> Noite</label>
        </div>

        <button onclick="salvar()">Salvar</button>
        <button onclick="limpar()">Limpar</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Código</th>
                <th>Nome</th>
                <th>Nota 1</th>
                <th>Nota 2</th>
                <th>Nota 3</th>
                <th>Média</th>
                <th>Situação</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaAlunos"></tbody>
    </table>
</div>

<script src="/assets/js/nota-aluno.js"></script>
</body>
</html>
